version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: hypertrophy_db
    environment:
      POSTGRES_DB: hypertrophy_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: hypertrophy_api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hypertrophy_tracker
      NODE_ENV: development
      PORT: 5000
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: hypertrophy_web
    environment:
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - '3000:3000'
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    command: npm start

volumes:
  postgres_data:
